apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-http-artifact-source
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simple-http-artifact-source
  template:
    metadata:
      labels:
        app: simple-http-artifact-source
    spec:
      initContainers:
        - name: seed-artifact
          image: busybox:1.36
          command:
            - sh
            - -ceu
            - |
              mkdir -p /www/artifacts
              dd if=/dev/zero of=/www/artifacts/dataset-100mb.bin bs=1048576 count=100
          volumeMounts:
            - name: artifact-data
              mountPath: /www
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: artifact-data
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: artifact-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: simple-http-artifact-source
spec:
  selector:
    app: simple-http-artifact-source
  ports:
    - name: http
      port: 80
      targetPort: http

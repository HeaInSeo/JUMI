name: CodeQL

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  schedule:
    - cron: "31 3 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: manual
          - language: actions
            build-mode: none

    steps:
      - name: Clone the code
        uses: actions/checkout@v6

      - name: Setup Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Prepare local replacements
        if: matrix.language == 'go'
        run: |
          if grep -R "=> ../../../kube-slint" tools >/dev/null 2>&1; then
            if [ ! -d ../kube-slint/.git ]; then
              git clone --depth 1 https://github.com/HeaInSeo/kube-slint ../kube-slint
            fi
          fi

      - name: Build Go packages
        if: matrix.language == 'go'
        run: |
          go build ./...
          for module in tools/kubeslint-smoke-summary tools/jumi-smoke; do
            if [ -f "${module}/go.mod" ]; then
              (cd "${module}" && go build ./...)
            fi
          done

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

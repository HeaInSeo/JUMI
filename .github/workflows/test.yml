name: Test

on:
  push:
    paths-ignore:
      - "**/*.md"
      - "LICENSE*"
      - ".github/**/*.md"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "LICENSE*"
      - ".github/**/*.md"

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit Regression And Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run tests
        run: make test

      - name: Run regression suite
        run: make test-regression

      - name: Run dependency license guardrail
        run: make license-check

      - name: Run vulnerability guardrail
        run: make vuln-check

      - name: Generate coverage report and enforce threshold
        run: make coverage-check

      - name: Check no fmt drift
        run: git diff --exit-code '*.go'

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: jumi-coverage
          path: reports/

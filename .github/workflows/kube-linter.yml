name: Kube Linter

on:
  push:
    paths:
      - ".github/workflows/kube-linter.yml"
      - "Makefile"
      - "deploy/k8s/**"
  pull_request:
    paths:
      - ".github/workflows/kube-linter.yml"
      - "Makefile"
      - "deploy/k8s/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: kube-linter-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kube-linter:
    name: Lint deploy manifests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOBIN: ${{ github.workspace }}/bin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.1"

      - name: Install kube-linter into project bin
        run: |
          mkdir -p "$GOBIN"
          go install golang.stackrox.io/kube-linter/cmd/kube-linter@v0.8.3

      - name: Run kube-linter
        run: make kube-linter
